name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'vst/**'
      - '.github/workflows/build-windows.yml'
      - 'manifest.json'
      - 'synthlen-khmer.html'
      - 'uploads/**'

jobs:
  build-windows:
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Bundle UI
        shell: pwsh
        working-directory: vst
        run: |
          if (Test-Path "..\synthlen-khmer.html") {
            New-Item -ItemType Directory -Force -Path "ui" | Out-Null
            Copy-Item "..\synthlen-khmer.html" "ui\" -Force
            if (Test-Path "..\uploads") { Copy-Item "..\uploads" "ui\" -Recurse -Force }
            if (Test-Path "..\manifest.json") { Copy-Item "..\manifest.json" "ui\" -Force }
            Write-Host "UI bundled"
          } else {
            Write-Host "WARNING: synthlen-khmer.html not found"
          }

      - name: Recombine sound banks from LFS
        shell: pwsh
        working-directory: vst
        run: |
          Write-Host "Recombining bank from LFS parts..."
          $p1 = [System.IO.File]::OpenRead("SynthlenKhmer.banks.part1")
          $p2 = [System.IO.File]::OpenRead("SynthlenKhmer.banks.part2")
          $out = [System.IO.File]::Create("SynthlenKhmer.banks")
          $p1.CopyTo($out, 1048576)
          $p2.CopyTo($out, 1048576)
          $p1.Close(); $p2.Close(); $out.Close()

          $size = (Get-Item "SynthlenKhmer.banks").Length
          Write-Host "Combined: $([math]::Round($size/1MB,1)) MB"
          if ($size -lt 100MB) { throw "Bank file too small - LFS checkout may have failed" }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: cmd
        working-directory: vst
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: cmd
        working-directory: vst
        run: cmake --build build --config Release --parallel 4

      - name: Create Windows Installer
        shell: pwsh
        working-directory: vst
        run: |
          $version = "1.0.0"
          $buildOut = "build\SynthlenKhmer_artefacts\Release"
          $staging = "installer_staging"
          $outDir = "installer_output"

          Remove-Item $staging -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $outDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          # Copy VST3 (includes bank in Contents/Resources)
          $vst3 = Get-ChildItem "$buildOut\VST3" -Filter "*.vst3" -Recurse | Select-Object -First 1
          if ($vst3) {
            Copy-Item $vst3.FullName $staging -Recurse
            Write-Host "VST3 copied (with bundled bank)"
            # Verify bank is inside
            $bankInVst3 = Join-Path $staging "Synthlen Khmer.vst3\Contents\Resources\SynthlenKhmer.banks"
            if (Test-Path $bankInVst3) {
              $sz = [math]::Round((Get-Item $bankInVst3).Length / 1MB, 1)
              Write-Host "  Bank bundled: $sz MB"
            } else {
              Write-Host "  WARNING: Bank not found in VST3!"
            }
          }

          # Copy Standalone
          $exe = Get-ChildItem "$buildOut\Standalone" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName $staging
            Write-Host "Standalone copied"
          }

          # Create install batch script
          # Bank is bundled inside VST3. Installer copies it to shared locations for Standalone.
          $lines = @(
            '@echo off',
            ':: Self-elevate to admin',
            'net session >nul 2>&1',
            'if %errorlevel% neq 0 (',
            '  powershell -Command "Start-Process cmd -ArgumentList ''/c %~f0'' -Verb RunAs"',
            '  exit /b',
            ')',
            'cd /d "%~dp0"',
            'echo ========================================',
            'echo   Synthlen Khmer Installer v1.0.0',
            'echo ========================================',
            '',
            'set VST3_DIR=%COMMONPROGRAMFILES%\VST3',
            'set APP_DIR=%PROGRAMFILES%\Synthlen Khmer',
            'set BANKS_DIR=%USERPROFILE%\Documents\Synthlen Khmer',
            'set SHARED_DIR=%PROGRAMDATA%\Synthlen Khmer',
            '',
            'echo Installing VST3 (includes sound bank)...',
            'if not exist "%VST3_DIR%" mkdir "%VST3_DIR%"',
            'xcopy /E /I /Y "Synthlen Khmer.vst3" "%VST3_DIR%\Synthlen Khmer.vst3" >nul 2>&1',
            '',
            'echo Installing Standalone...',
            'if not exist "%APP_DIR%" mkdir "%APP_DIR%"',
            'copy /Y "Synthlen Khmer.exe" "%APP_DIR%\" >nul 2>&1',
            '',
            'echo Copying sound banks from VST3 to shared locations...',
            'set VST3BANK=%VST3_DIR%\Synthlen Khmer.vst3\Contents\Resources\SynthlenKhmer.banks',
            'if exist "%VST3BANK%" (',
            '  if not exist "%BANKS_DIR%" mkdir "%BANKS_DIR%"',
            '  copy /Y "%VST3BANK%" "%BANKS_DIR%\" >nul 2>&1',
            '  if not exist "%SHARED_DIR%" mkdir "%SHARED_DIR%"',
            '  copy /Y "%VST3BANK%" "%SHARED_DIR%\" >nul 2>&1',
            '  copy /Y "%VST3BANK%" "%APP_DIR%\" >nul 2>&1',
            '  echo  -^> Banks copied to Documents, ProgramData, and app folder',
            ') else (',
            '  echo  -^> WARNING: Bank not found in VST3',
            ')',
            '',
            'echo Creating Shortcut...',
            'powershell -Command "$ws = New-Object -ComObject WScript.Shell; $sc = $ws.CreateShortcut([Environment]::GetFolderPath(''Desktop'') + ''\Synthlen Khmer.lnk''); $sc.TargetPath = ''%PROGRAMFILES%\Synthlen Khmer\Synthlen Khmer.exe''; $sc.Save()"',
            '',
            'echo.',
            'echo Installation complete!',
            'echo VST3:       %VST3_DIR%\Synthlen Khmer.vst3',
            'echo Standalone: %APP_DIR%\Synthlen Khmer.exe',
            'echo Banks:      Bundled in VST3 + copied to shared locations',
            'pause'
          )
          $lines | Out-File "$staging\Install-SynthlenKhmer.bat" -Encoding ASCII

          # Create installer using 7z with max compression (LZMA2)
          Write-Host "Creating installer 7z with max compression..."
          7z a -t7z -mx=9 -mfb=273 "$outDir\SynthlenKhmer-Setup-$version.7z" "$staging\*"

          # Create self-extracting EXE using 7z SFX module
          Write-Host "Creating self-extracting EXE..."
          $sfxModule = "C:\Program Files\7-Zip\7zSD.sfx"
          if (-not (Test-Path $sfxModule)) {
            Write-Host "7zSD.sfx not found, downloading..."
            Invoke-WebRequest -Uri "https://github.com/chromiumembedded/cef/raw/master/third_party/7z/7zSD.sfx" -OutFile $sfxModule -ErrorAction SilentlyContinue
            if (-not (Test-Path $sfxModule)) {
              # Fallback: check other locations
              $sfxModule = Get-ChildItem "C:\Program Files\7-Zip" -Filter "*.sfx" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
            }
          }
          $sfxConfig = "$outDir\sfx_config.txt"
          @(
            ';!@Install@!UTF-8!',
            'Title="Synthlen Khmer Installer v1.0.0"',
            'BeginPrompt="Do you want to install Synthlen Khmer?"',
            'RunProgram="Install-SynthlenKhmer.bat"',
            ';!@InstallEnd@!'
          ) | Out-File $sfxConfig -Encoding UTF8

          $exePath = "$outDir\SynthlenKhmer-Setup-$version.exe"
          if ($sfxModule -and (Test-Path $sfxModule)) {
            Write-Host "Using SFX module: $sfxModule"
            # Combine using PowerShell binary streams (SFX module + config + 7z archive)
            $out = [System.IO.File]::Create($exePath)
            $sfx = [System.IO.File]::OpenRead($sfxModule); $sfx.CopyTo($out, 1048576); $sfx.Close()
            $cfg = [System.IO.File]::OpenRead($sfxConfig); $cfg.CopyTo($out, 1048576); $cfg.Close()
            $archive = [System.IO.File]::OpenRead("$outDir\SynthlenKhmer-Setup-$version.7z"); $archive.CopyTo($out, 1048576); $archive.Close()
            $out.Close()
            Remove-Item $sfxConfig -Force
            Remove-Item "$outDir\SynthlenKhmer-Setup-$version.7z" -Force
            Write-Host "Self-extracting EXE created!"
          } else {
            Write-Host "WARNING: No SFX module found - falling back to .7z archive"
            Remove-Item $sfxConfig -Force -ErrorAction SilentlyContinue
            Rename-Item "$outDir\SynthlenKhmer-Setup-$version.7z" "$exePath" -ErrorAction SilentlyContinue
          }

          # Check if under 2GB for GitHub Release
          $installerSize = (Get-Item $exePath).Length
          Write-Host "Installer EXE size: $([math]::Round($installerSize/1MB,1)) MB"
          if ($installerSize -gt 1900000000) {
            Write-Host "Still over 2GB - splitting into parts..."
            7z a -v1900m "$outDir\SynthlenKhmer-Setup-$version.split.7z" $exePath
            Remove-Item $exePath -Force
            Get-ChildItem "$outDir\SynthlenKhmer-Setup-$version.split.7z.*" | ForEach-Object {
              $newName = $_.Name -replace '\.split\.7z\.(\d+)', '.7z.$1'
              Rename-Item $_.FullName $newName
            }
            Write-Host "Split into parts"
          } else {
            Write-Host "Under 2GB - single EXE file OK!"
          }

          Write-Host "Installer output:"
          Get-ChildItem "$outDir" | ForEach-Object { Write-Host "  $($_.Name) - $([math]::Round($_.Length/1MB,1)) MB" }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-Windows-Installer
          path: vst/installer_output/*
          if-no-files-found: warn

      - name: Auto-publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-windows
          name: Synthlen Khmer v1.0.0 - Windows
          body: |
            ## Synthlen Khmer - Windows Installer (bank bundled inside)

            The sound bank is now bundled inside the VST3 plugin - install once, no separate bank download needed.

            ### Install (single .exe file)
            1. Download `SynthlenKhmer-Setup-1.0.0.exe`
            2. Double-click to run (will request admin permission automatically)
            3. Click Yes on the install prompt
            4. Done! Bank is bundled in VST3 and copied to shared locations:
               - VST3 → `C:\Program Files\Common Files\VST3\Synthlen Khmer.vst3`
               - Standalone → `C:\Program Files\Synthlen Khmer\Synthlen Khmer.exe`
               - Banks → `Documents\Synthlen Khmer\` + `C:\ProgramData\Synthlen Khmer\`

            ### Install (if split .7z part files)
            1. Download ALL `.7z.*` part files
            2. Recombine: `copy /b SynthlenKhmer-Setup-1.0.0.7z.001+SynthlenKhmer-Setup-1.0.0.7z.002 SynthlenKhmer-Setup-1.0.0.exe`
            3. Double-click `SynthlenKhmer-Setup-1.0.0.exe` to install

            ### Presets included
            - Russey Khyal
            - Pei Bampe
            - Sax
            - Houch
            - Harmonica
            - HARMONIC
            - Jab

            ### Build info
            - x64 build
            - 16 AUX outputs + Main stereo
          files: |
            vst/installer_output/*
          prerelease: false
          fail_on_unmatched_files: false
