name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'vst/**'
      - '.github/workflows/build-macos.yml'
      - 'manifest.json'
      - 'synthlen-khmer.html'
      - 'uploads/**'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja
          pip3 install --break-system-packages gdown

      - name: Bundle UI
        shell: bash
        working-directory: vst
        run: bash bundle-ui.sh

      - name: Download & recombine sound banks
        shell: bash
        working-directory: vst
        run: |
          echo "Downloading bank pack part 1 from Google Drive..."
          gdown "1awAW5NPC_9QVf7ro59EATCzrLpHzQ9QR" -O SynthlenKhmer.banks.part1 || \
            curl -L "https://drive.google.com/uc?export=download&id=1awAW5NPC_9QVf7ro59EATCzrLpHzQ9QR" -o SynthlenKhmer.banks.part1

          echo "Downloading bank pack part 2 from Google Drive..."
          gdown "1ncpgk5fk3ERz7wTq7d668VhqJsR7kmvv" -O SynthlenKhmer.banks.part2 || \
            curl -L "https://drive.google.com/uc?export=download&id=1ncpgk5fk3ERz7wTq7d668VhqJsR7kmvv" -o SynthlenKhmer.banks.part2

          echo "Recombining..."
          cat SynthlenKhmer.banks.part1 SynthlenKhmer.banks.part2 > SynthlenKhmer.banks

          SIZE=$(stat -f%z SynthlenKhmer.banks 2>/dev/null || stat -c%s SynthlenKhmer.banks)
          echo "Combined banks file: $SIZE bytes ($((SIZE / 1048576)) MB)"

          # Verify magic header
          MAGIC=$(head -c 6 SynthlenKhmer.banks)
          echo "Magic header: $MAGIC"
          if [ "$MAGIC" != "SYNKB1" ]; then
            echo "WARNING: Bad magic header - banks file may be corrupt"
          fi

          # Clean up parts
          rm -f SynthlenKhmer.banks.part1 SynthlenKhmer.banks.part2

      - name: Configure CMake
        shell: bash
        working-directory: vst
        run: cmake -B build -G "Xcode" -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        shell: bash
        working-directory: vst
        run: cmake --build build --config Release --parallel 4 2>&1 || cmake --build build --config Release CODE_SIGNING_ALLOWED=NO 2>&1

      - name: List build artifacts
        shell: bash
        working-directory: vst
        run: |
          echo "=== Build artifacts ==="
          find build/SynthlenKhmer_artefacts/Release -type f -name "*.vst3" -o -name "*.app" -o -name "*.component" | head -20
          ls -la build/SynthlenKhmer_artefacts/Release/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/VST3/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/Standalone/ 2>/dev/null || true

      - name: Create macOS Installer PKG
        shell: bash
        working-directory: vst
        run: |
          VERSION="1.0.0"
          PKG_DIR="installer_output"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3"
          mkdir -p "$PKG_DIR/root/Applications"
          mkdir -p "$PKG_DIR/root/Users/Shared/Synthlen Khmer"
          mkdir -p "$PKG_DIR/scripts"

          # Copy VST3
          VST3_SRC="build/SynthlenKhmer_artefacts/Release/VST3/Synthlen Khmer.vst3"
          if [ -d "$VST3_SRC" ]; then
            cp -R "$VST3_SRC" "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3/"
            echo "VST3 copied"
          else
            echo "WARNING: VST3 not found at $VST3_SRC"
          fi

          # Copy Standalone
          STANDALONE_SRC="build/SynthlenKhmer_artefacts/Release/Standalone/Synthlen Khmer.app"
          if [ -d "$STANDALONE_SRC" ]; then
            cp -R "$STANDALONE_SRC" "$PKG_DIR/root/Applications/"
            echo "Standalone copied"
          else
            echo "WARNING: Standalone not found"
          fi

          # Copy encrypted bank pack if it exists (skip if >2GB for GitHub Release)
          BANKS_SIZE=0
          if [ -f "SynthlenKhmer.banks" ]; then
            BANKS_SIZE=$(stat -f%z SynthlenKhmer.banks 2>/dev/null || stat -c%s SynthlenKhmer.banks)
          fi
          if [ "$BANKS_SIZE" -lt 2000000000 ] && [ -f "SynthlenKhmer.banks" ]; then
            cp "SynthlenKhmer.banks" "$PKG_DIR/root/Users/Shared/Synthlen Khmer/"
            echo "Banks pack copied ($((BANKS_SIZE / 1048576)) MB)"
          else
            echo "Banks file too large ($((BANKS_SIZE / 1048576)) MB) - user downloads separately"
          fi

          # Postinstall script
          cat > "$PKG_DIR/scripts/postinstall" << 'SCRIPT'
          #!/bin/bash
          # Copy banks to user Documents on first launch via launch agent
          BANKS_SRC="/Users/Shared/Synthlen Khmer/SynthlenKhmer.banks"
          if [ -f "$BANKS_SRC" ]; then
            for USER_HOME in /Users/*; do
              USER_NAME=$(basename "$USER_HOME")
              if [ "$USER_NAME" = "Shared" ] || [ "$USER_NAME" = "." ] || [ "$USER_NAME" = ".." ]; then
                continue
              fi
              DEST="$USER_HOME/Documents/Synthlen Khmer"
              mkdir -p "$DEST"
              cp "$BANKS_SRC" "$DEST/" 2>/dev/null || true
              chown -R "$USER_NAME:staff" "$DEST" 2>/dev/null || true
            done
          fi
          SCRIPT
          chmod +x "$PKG_DIR/scripts/postinstall"

          # Build component package
          pkgbuild \
            --root "$PKG_DIR/root" \
            --scripts "$PKG_DIR/scripts" \
            --identifier "com.synthlen.khmer" \
            --version "$VERSION" \
            "$PKG_DIR/SynthlenKhmer.pkg"

          # Build product archive (distributable)
          productbuild \
            --package "$PKG_DIR/SynthlenKhmer.pkg" \
            "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"

          echo "=== Installer created ==="
          ls -lh "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"
          echo "Banks file size:"
          ls -lh SynthlenKhmer.banks 2>/dev/null || echo "No banks file"

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Installer
          path: vst/installer_output/SynthlenKhmer-Setup-*.pkg
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-VST3
          path: vst/build/SynthlenKhmer_artefacts/Release/VST3/*.vst3
          if-no-files-found: warn

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Standalone
          path: vst/build/SynthlenKhmer_artefacts/Release/Standalone/*.app
          if-no-files-found: warn

      - name: Auto-publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-macos
          name: Synthlen Khmer v1.0.0 - macOS
          body: |
            ## Synthlen Khmer - macOS Installer

            ### Install
            1. Download `SynthlenKhmer-Setup-1.0.0.pkg`
            2. Double-click to install
            3. VST3 → `/Library/Audio/Plug-Ins/VST3/`
            4. Standalone → `/Applications/`

            ### Sound Banks (download separately)
            - Part 1: https://drive.google.com/file/d/1awAW5NPC_9QVf7ro59EATCzrLpHzQ9QR/view
            - Part 2: https://drive.google.com/file/d/1ncpgk5fk3ERz7wTq7d668VhqJsR7kmvv/view
            - Recombine: `cat SynthlenKhmer.banks.part1 SynthlenKhmer.banks.part2 > SynthlenKhmer.banks`
            - Place at: `~/Documents/Synthlen Khmer/SynthlenKhmer.banks`

            ### Build info
            - Universal Binary (Apple Silicon + Intel)
            - 16 AUX outputs + Main stereo
          files: vst/installer_output/SynthlenKhmer-Setup-*.pkg
          prerelease: false
          fail_on_unmatched_files: false
