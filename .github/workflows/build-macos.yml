name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'vst/**'
      - '.github/workflows/build-macos.yml'
      - 'manifest.json'
      - 'synthlen-khmer.html'
      - 'uploads/**'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja
          pip3 install --break-system-packages gdown

      - name: Bundle UI
        shell: bash
        working-directory: vst
        run: bash bundle-ui.sh

      - name: Download & recombine sound banks
        shell: bash
        working-directory: vst
        run: |
          echo "Downloading bank pack part 1 from Google Drive..."
          gdown "1RMRuVSP2O-r1K_RSvswuc2NTWGFrRTMZ" -O SynthlenKhmer.banks.part1 || \
            curl -L "https://drive.google.com/uc?export=download&id=1RMRuVSP2O-r1K_RSvswuc2NTWGFrRTMZ" -o SynthlenKhmer.banks.part1

          echo "Downloading bank pack part 2 from Google Drive..."
          gdown "1uQMq0ASgX0cKGcyaO1xNUhIvm0G0WP9F" -O SynthlenKhmer.banks.part2 || \
            curl -L "https://drive.google.com/uc?export=download&id=1uQMq0ASgX0cKGcyaO1xNUhIvm0G0WP9F" -o SynthlenKhmer.banks.part2

          echo "Recombining..."
          cat SynthlenKhmer.banks.part1 SynthlenKhmer.banks.part2 > SynthlenKhmer.banks

          SIZE=$(stat -f%z SynthlenKhmer.banks 2>/dev/null || stat -c%s SynthlenKhmer.banks)
          echo "Combined banks file: $SIZE bytes ($((SIZE / 1048576)) MB)"

          # Verify magic header
          MAGIC=$(head -c 6 SynthlenKhmer.banks)
          echo "Magic header: $MAGIC"
          if [ "$MAGIC" != "SYNKB1" ]; then
            echo "WARNING: Bad magic header - banks file may be corrupt"
          fi

          # Clean up parts
          rm -f SynthlenKhmer.banks.part1 SynthlenKhmer.banks.part2

      - name: Configure CMake
        shell: bash
        working-directory: vst
        run: cmake -B build -G "Xcode" -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO

      - name: Build
        shell: bash
        working-directory: vst
        run: cmake --build build --config Release --parallel 4 -- CODE_SIGNING_ALLOWED=NO 2>&1

      - name: List build artifacts
        shell: bash
        working-directory: vst
        run: |
          echo "=== Build artifacts ==="
          find build/SynthlenKhmer_artefacts/Release -type f -name "*.vst3" -o -name "*.app" -o -name "*.component" | head -20
          ls -la build/SynthlenKhmer_artefacts/Release/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/VST3/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/Standalone/ 2>/dev/null || true

      - name: Create macOS Installer PKG
        shell: bash
        working-directory: vst
        run: |
          VERSION="1.0.0"
          PKG_DIR="installer_output"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3"
          mkdir -p "$PKG_DIR/root/Applications"
          mkdir -p "$PKG_DIR/root/Users/Shared/Synthlen Khmer"
          mkdir -p "$PKG_DIR/scripts"

          # Copy VST3
          VST3_SRC="build/SynthlenKhmer_artefacts/Release/VST3/Synthlen Khmer.vst3"
          if [ -d "$VST3_SRC" ]; then
            cp -R "$VST3_SRC" "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3/"
            echo "VST3 copied"
          else
            echo "WARNING: VST3 not found at $VST3_SRC"
          fi

          # Copy Standalone
          STANDALONE_SRC="build/SynthlenKhmer_artefacts/Release/Standalone/Synthlen Khmer.app"
          if [ -d "$STANDALONE_SRC" ]; then
            cp -R "$STANDALONE_SRC" "$PKG_DIR/root/Applications/"
            echo "Standalone copied"
          else
            echo "WARNING: Standalone not found"
          fi

          # The bank is now bundled INSIDE the .app and .vst3 by the CMake
          # post-build step (Contents/Resources/SynthlenKhmer.banks), so the
          # plugin travels with the bank. No manual placement needed.
          echo "Verifying bank is bundled inside plugin bundles..."
          ls -lh "$PKG_DIR/root/Applications/Synthlen Khmer.app/Contents/Resources/SynthlenKhmer.banks" 2>/dev/null \
            && echo "OK: bank bundled in Standalone .app" || echo "WARN: bank not found in .app"
          ls -lh "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3/Synthlen Khmer.vst3/Contents/Resources/SynthlenKhmer.banks" 2>/dev/null \
            && echo "OK: bank bundled in VST3" || echo "WARN: bank not found in VST3"

          # Postinstall: bank already bundled inside plugins, nothing to place.
          cat > "$PKG_DIR/scripts/postinstall" << 'SCRIPT'
          #!/bin/bash
          # Bank is bundled inside the plugin bundles - no manual steps needed.
          exit 0
          SCRIPT
          chmod +x "$PKG_DIR/scripts/postinstall"

          # Build component package
          pkgbuild \
            --root "$PKG_DIR/root" \
            --scripts "$PKG_DIR/scripts" \
            --identifier "com.synthlen.khmer" \
            --version "$VERSION" \
            "$PKG_DIR/SynthlenKhmer.pkg"

          # Build product archive (distributable)
          productbuild \
            --package "$PKG_DIR/SynthlenKhmer.pkg" \
            "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"

          echo "=== Installer created (bank bundled inside) ==="
          FINAL_PKG="$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"
          ls -lh "$FINAL_PKG"

          # GitHub Release has a 2 GB per-file limit. The .pkg now includes the
          # bank inside both bundles (~5 GB), so split it into <2GB parts for
          # release upload. Users recombine into the .pkg, then double-click.
          PKG_SIZE=$(stat -f%z "$FINAL_PKG" 2>/dev/null || stat -c%s "$FINAL_PKG")
          echo "Final PKG size: $((PKG_SIZE / 1048576)) MB"
          if [ "$PKG_SIZE" -gt 1900000000 ]; then
            echo "PKG exceeds 1.9 GB - splitting into parts for GitHub Release..."
            split -b 1900m "$FINAL_PKG" "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg.part"
            ls -lh "$PKG_DIR"/SynthlenKhmer-Setup-$VERSION.pkg.part*
          else
            echo "PKG under limit - no split needed."
          fi

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Installer
          path: vst/installer_output/SynthlenKhmer-Setup-*.pkg
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-VST3
          path: vst/build/SynthlenKhmer_artefacts/Release/VST3/*.vst3
          if-no-files-found: warn

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Standalone
          path: vst/build/SynthlenKhmer_artefacts/Release/Standalone/*.app
          if-no-files-found: warn

      - name: Auto-publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-macos
          name: Synthlen Khmer v1.0.0 - macOS
          body: |
            ## Synthlen Khmer - macOS Installer (bank bundled inside)

            The sound bank is now **bundled inside the plugin** - install once,
            no separate bank download or manual placement needed.

            ### Install
            1. Download ALL `.pkg.part*` files from this release
            2. Recombine them in Terminal:
               ```bash
               cat SynthlenKhmer-Setup-1.0.0.pkg.part* > SynthlenKhmer-Setup-1.0.0.pkg
               ```
            3. Double-click `SynthlenKhmer-Setup-1.0.0.pkg` to install
            4. Done! Bank travels with the plugin:
               - VST3 → `/Library/Audio/Plug-Ins/VST3/Synthlen Khmer.vst3`
               - Standalone → `/Applications/Synthlen Khmer.app`

            ### Presets included
            - Russey Khyal
            - Pei Bampe
            - Sax
            - Houch
            - Harmonica
            - Jab

            ### Build info
            - Universal Binary (Apple Silicon + Intel)
            - 16 AUX outputs + Main stereo
          files: |
            vst/installer_output/SynthlenKhmer-Setup-*.pkg.part*
          prerelease: false
          fail_on_unmatched_files: false
