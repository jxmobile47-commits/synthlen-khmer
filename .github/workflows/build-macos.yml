name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'vst/**'
      - '.github/workflows/build-macos.yml'
      - 'manifest.json'
      - 'synthlen-khmer.html'
      - 'uploads/**'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          brew install cmake ninja p7zip

      - name: Bundle UI
        shell: bash
        working-directory: vst
        run: bash bundle-ui.sh

      - name: Recombine sound banks from LFS
        shell: bash
        working-directory: vst
        run: |
          echo "Recombining bank from LFS parts..."
          cat SynthlenKhmer.banks.part1 SynthlenKhmer.banks.part2 > SynthlenKhmer.banks

          SIZE=$(stat -f%z SynthlenKhmer.banks 2>/dev/null || stat -c%s SynthlenKhmer.banks)
          echo "Combined banks file: $SIZE bytes ($((SIZE / 1048576)) MB)"

          if [ "$SIZE" -lt 104857600 ]; then
            echo "ERROR: Bank file too small - LFS checkout may have failed"
            exit 1
          fi

          # Verify magic header
          MAGIC=$(head -c 6 SynthlenKhmer.banks)
          echo "Magic header: $MAGIC"
          if [ "$MAGIC" != "SYNKB1" ]; then
            echo "WARNING: Bad magic header - banks file may be corrupt"
          fi

      - name: Configure CMake
        shell: bash
        working-directory: vst
        run: cmake -B build -G "Xcode" -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO

      - name: Build
        shell: bash
        working-directory: vst
        run: cmake --build build --config Release --parallel 4 -- CODE_SIGNING_ALLOWED=NO 2>&1

      - name: List build artifacts
        shell: bash
        working-directory: vst
        run: |
          echo "=== Build artifacts ==="
          find build/SynthlenKhmer_artefacts/Release -type f -name "*.vst3" -o -name "*.app" -o -name "*.component" | head -20
          ls -la build/SynthlenKhmer_artefacts/Release/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/VST3/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/Standalone/ 2>/dev/null || true

      - name: Create macOS Installer PKG
        shell: bash
        working-directory: vst
        run: |
          VERSION="1.0.0"
          PKG_DIR="installer_output"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3"
          mkdir -p "$PKG_DIR/root/Applications"
          mkdir -p "$PKG_DIR/root/Users/Shared/Synthlen Khmer"
          mkdir -p "$PKG_DIR/scripts"

          # Copy VST3
          VST3_SRC="build/SynthlenKhmer_artefacts/Release/VST3/Synthlen Khmer.vst3"
          if [ -d "$VST3_SRC" ]; then
            cp -R "$VST3_SRC" "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3/"
            echo "VST3 copied"
          else
            echo "WARNING: VST3 not found at $VST3_SRC"
          fi

          # Copy Standalone
          STANDALONE_SRC="build/SynthlenKhmer_artefacts/Release/Standalone/Synthlen Khmer.app"
          if [ -d "$STANDALONE_SRC" ]; then
            cp -R "$STANDALONE_SRC" "$PKG_DIR/root/Applications/"
            echo "Standalone copied"
          else
            echo "WARNING: Standalone not found"
          fi

          # Bank is bundled ONLY inside the VST3 bundle (not Standalone) to keep
          # installer size ~2.5 GB. The postinstall script copies it to shared
          # location for the Standalone app to find.
          echo "Verifying bank is bundled inside VST3..."
          ls -lh "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3/Synthlen Khmer.vst3/Contents/Resources/SynthlenKhmer.banks" 2>/dev/null \
            && echo "OK: bank bundled in VST3" || echo "WARN: bank not found in VST3"

          # Postinstall: copy bank from VST3 to shared location so Standalone can find it.
          cat > "$PKG_DIR/scripts/postinstall" << 'SCRIPT'
          #!/bin/bash
          # Bank is bundled inside VST3. Copy to shared location for Standalone.
          SHARED_DIR="/Library/Application Support/Synthlen Khmer"
          mkdir -p "$SHARED_DIR"
          VST3_BANK="/Library/Audio/Plug-Ins/VST3/Synthlen Khmer.vst3/Contents/Resources/SynthlenKhmer.banks"
          if [ -f "$VST3_BANK" ]; then
            cp "$VST3_BANK" "$SHARED_DIR/SynthlenKhmer.banks"
            echo "Copied bank to $SHARED_DIR"
          fi
          exit 0
          SCRIPT
          chmod +x "$PKG_DIR/scripts/postinstall"

          # Build component package
          pkgbuild \
            --root "$PKG_DIR/root" \
            --scripts "$PKG_DIR/scripts" \
            --identifier "com.synthlen.khmer" \
            --version "$VERSION" \
            "$PKG_DIR/SynthlenKhmer.pkg"

          # Build product archive (distributable)
          productbuild \
            --package "$PKG_DIR/SynthlenKhmer.pkg" \
            "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"

          echo "=== Installer created (bank bundled inside) ==="
          FINAL_PKG="$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"
          ls -lh "$FINAL_PKG"

          # GitHub Release has a 2 GB per-file limit.
          # Try compressing the .pkg with 7z (LZMA2 max) to get under 2GB.
          # If still over, split into parts.
          PKG_SIZE=$(stat -f%z "$FINAL_PKG" 2>/dev/null || stat -c%s "$FINAL_PKG")
          echo "Final PKG size: $((PKG_SIZE / 1048576)) MB"

          if [ "$PKG_SIZE" -gt 1900000000 ]; then
            echo "PKG over 1.9 GB - compressing with 7z (max)..."
            7z a -t7z -mx=9 -mfb=273 "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.7z" "$FINAL_PKG"
            rm -f "$FINAL_PKG"
            SEVENZ_SIZE=$(stat -f%z "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.7z" 2>/dev/null || stat -c%s "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.7z")
            echo "7z compressed size: $((SEVENZ_SIZE / 1048576)) MB"

            if [ "$SEVENZ_SIZE" -gt 1900000000 ]; then
              echo "Still over 1.9 GB - splitting 7z into parts..."
              split -b 1900m "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.7z" "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.7z.part"
              rm -f "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.7z"
              ls -lh "$PKG_DIR"/SynthlenKhmer-Setup-$VERSION.7z.part*
            else
              echo "7z under 2 GB - single file!"
              ls -lh "$PKG_DIR"/SynthlenKhmer-Setup-$VERSION.7z
            fi
          else
            echo "PKG under limit - no compression needed."
          fi

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Installer
          path: |
            vst/installer_output/SynthlenKhmer-Setup-*.pkg
            vst/installer_output/SynthlenKhmer-Setup-*.7z*
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-VST3
          path: vst/build/SynthlenKhmer_artefacts/Release/VST3/*.vst3
          if-no-files-found: warn

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Standalone
          path: vst/build/SynthlenKhmer_artefacts/Release/Standalone/*.app
          if-no-files-found: warn

      - name: Auto-publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-macos
          name: Synthlen Khmer v1.0.0 - macOS
          body: |
            ## Synthlen Khmer - macOS Installer (bank bundled inside)

            The sound bank is now bundled inside the VST3 plugin - install once, no separate bank download needed.

            ### Install (single .7z file)
            1. Download `SynthlenKhmer-Setup-1.0.0.7z`
            2. Extract with 7z: `7z x SynthlenKhmer-Setup-1.0.0.7z`
               (Install p7zip first: `brew install p7zip`)
            3. Double-click `SynthlenKhmer-Setup-1.0.0.pkg` to install
            4. Done! Bank is bundled in VST3 and copied to shared location:
               - VST3 → `/Library/Audio/Plug-Ins/VST3/Synthlen Khmer.vst3`
               - Standalone → `/Applications/Synthlen Khmer.app`
               - Banks → `/Library/Application Support/Synthlen Khmer/`

            ### Install (if split .7z.part* files)
            1. Download ALL `.7z.part*` files
            2. Recombine: `cat SynthlenKhmer-Setup-1.0.0.7z.part* > SynthlenKhmer-Setup-1.0.0.7z`
            3. Extract: `7z x SynthlenKhmer-Setup-1.0.0.7z` (install p7zip: `brew install p7zip`)
            4. Double-click `SynthlenKhmer-Setup-1.0.0.pkg` to install

            ### Presets included
            - Russey Khyal
            - Pei Bampe
            - Sax
            - Houch
            - Harmonica
            - Jab

            ### Build info
            - Universal Binary (Apple Silicon + Intel)
            - 16 AUX outputs + Main stereo
          files: |
            vst/installer_output/SynthlenKhmer-Setup-*.pkg
            vst/installer_output/SynthlenKhmer-Setup-*.7z
            vst/installer_output/SynthlenKhmer-Setup-*.7z.part*
          prerelease: false
          fail_on_unmatched_files: false
