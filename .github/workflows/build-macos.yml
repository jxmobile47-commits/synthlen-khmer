name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'vst/**'
      - '.github/workflows/build-macos.yml'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja

      - name: Bundle UI
        shell: bash
        working-directory: vst
        run: bash bundle-ui.sh

      - name: Pack banks (if present)
        shell: bash
        working-directory: vst
        run: |
          if [ -d banks ] && [ "$(find banks -name '*.wav' | head -1)" ]; then
            bash pack-banks.sh
          else
            echo "No .wav samples found - skipping bank pack"
          fi

      - name: Configure CMake
        shell: bash
        working-directory: vst
        run: cmake -B build -G "Xcode" -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        shell: bash
        working-directory: vst
        run: cmake --build build --config Release --parallel 4 2>&1 || cmake --build build --config Release CODE_SIGNING_ALLOWED=NO 2>&1

      - name: List build artifacts
        shell: bash
        working-directory: vst
        run: |
          echo "=== Build artifacts ==="
          find build/SynthlenKhmer_artefacts/Release -type f -name "*.vst3" -o -name "*.app" -o -name "*.component" | head -20
          ls -la build/SynthlenKhmer_artefacts/Release/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/VST3/ 2>/dev/null || true
          ls -la build/SynthlenKhmer_artefacts/Release/Standalone/ 2>/dev/null || true

      - name: Create macOS Installer PKG
        shell: bash
        working-directory: vst
        run: |
          VERSION="1.0.0"
          PKG_DIR="installer_output"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3"
          mkdir -p "$PKG_DIR/root/Applications"
          mkdir -p "$PKG_DIR/root/Users/Shared/Synthlen Khmer"
          mkdir -p "$PKG_DIR/scripts"

          # Copy VST3
          VST3_SRC="build/SynthlenKhmer_artefacts/Release/VST3/Synthlen Khmer.vst3"
          if [ -d "$VST3_SRC" ]; then
            cp -R "$VST3_SRC" "$PKG_DIR/root/Library/Audio/Plug-Ins/VST3/"
            echo "VST3 copied"
          else
            echo "WARNING: VST3 not found at $VST3_SRC"
          fi

          # Copy Standalone
          STANDALONE_SRC="build/SynthlenKhmer_artefacts/Release/Standalone/Synthlen Khmer.app"
          if [ -d "$STANDALONE_SRC" ]; then
            cp -R "$STANDALONE_SRC" "$PKG_DIR/root/Applications/"
            echo "Standalone copied"
          else
            echo "WARNING: Standalone not found"
          fi

          # Copy encrypted bank pack if it exists
          if [ -f "SynthlenKhmer.banks" ]; then
            cp "SynthlenKhmer.banks" "$PKG_DIR/root/Users/Shared/Synthlen Khmer/"
            echo "Banks pack copied"
          fi

          # Postinstall script
          cat > "$PKG_DIR/scripts/postinstall" << 'SCRIPT'
          #!/bin/bash
          # Copy banks to user Documents on first launch via launch agent
          BANKS_SRC="/Users/Shared/Synthlen Khmer/SynthlenKhmer.banks"
          if [ -f "$BANKS_SRC" ]; then
            for USER_HOME in /Users/*; do
              USER_NAME=$(basename "$USER_HOME")
              if [ "$USER_NAME" = "Shared" ] || [ "$USER_NAME" = "." ] || [ "$USER_NAME" = ".." ]; then
                continue
              fi
              DEST="$USER_HOME/Documents/Synthlen Khmer"
              mkdir -p "$DEST"
              cp "$BANKS_SRC" "$DEST/" 2>/dev/null || true
              chown -R "$USER_NAME:staff" "$DEST" 2>/dev/null || true
            done
          fi
          SCRIPT
          chmod +x "$PKG_DIR/scripts/postinstall"

          # Build component package
          pkgbuild \
            --root "$PKG_DIR/root" \
            --scripts "$PKG_DIR/scripts" \
            --identifier "com.synthlen.khmer" \
            --version "$VERSION" \
            "$PKG_DIR/SynthlenKhmer.pkg"

          # Build product archive (distributable)
          productbuild \
            --package "$PKG_DIR/SynthlenKhmer.pkg" \
            "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"

          echo "=== Installer created ==="
          ls -lh "$PKG_DIR/SynthlenKhmer-Setup-$VERSION.pkg"

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Installer
          path: vst/installer_output/SynthlenKhmer-Setup-*.pkg
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-VST3
          path: vst/build/SynthlenKhmer_artefacts/Release/VST3/*.vst3
          if-no-files-found: warn

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SynthlenKhmer-macOS-Standalone
          path: vst/build/SynthlenKhmer_artefacts/Release/Standalone/*.app
          if-no-files-found: warn
